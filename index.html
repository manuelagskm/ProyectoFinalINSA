<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PWA Educativa para Estudiantes Internacionales en Francia">
    <title>France Student Assistant</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <!-- W3C Standards: Semantic HTML, viewport meta, description meta, proper language attribute -->
</head>
<body>
    <header>
        <h1 id="app-title">France Student Assistant</h1>
        <div class="controls">
            <select id="language-selector" aria-label="Select Language">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
            <button id="toggle-editor-btn" aria-label="Toggle Customizer">🎨</button>
        </div>
    </header>

    <!-- Panel Educativo de Personalización (Live Customizer) -->
    <aside id="customizer-panel" class="hidden">
        <h2 id="customizer-title">Personalización (Estudiante)</h2>
        <p id="customizer-desc">Modifica estas variables para entender cómo CSS interactúa con JavaScript.</p>
        
        <div class="control-group">
            <label for="color-primary" id="lbl-color-primary">Color Principal:</label>
            <input type="color" id="color-primary" value="#4a90e2">
        </div>
        
        <div class="control-group">
            <label for="color-bg" id="lbl-color-bg">Color de Fondo:</label>
            <input type="color" id="color-bg" value="#f4f7f6">
        </div>
        
        <div class="control-group">
            <label for="font-selector" id="lbl-font">Fuente tipográfica:</label>
            <select id="font-selector">
                <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Sans-Serif (Moderna)</option>
                <option value="'Times New Roman', Times, serif">Serif (Clásica)</option>
                <option value="'Courier New', Courier, monospace">Monospace (Código)</option>
            </select>
        </div>
        <button id="reset-theme-btn">Reset</button>
    </aside>

    <main>
        <section id="chat-container" aria-live="polite">
            <div id="chat-history">
                <!-- Messages will be injected here via JavaScript -->
            </div>
            
            <div id="chat-options">
                <!-- Buttons for user replies will be injected here -->
            </div>
        </section>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
